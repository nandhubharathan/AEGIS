services:
  juice_shop:
    image: bkimminich/juice-shop:latest
    container_name: vuln_juice_shop
    ports:
      - "0.0.0.0:3000:3000"
    networks:
      - pentest_lab
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: vuln_dvwa
    ports:
      - "0.0.0.0:8081:80"
    networks:
      - pentest_lab
    restart: unless-stopped

  webgoat:
    image: webgoat/webgoat:latest
    container_name: vuln_webgoat
    environment:
      - TZ=UTC
    ports:
      - "0.0.0.0:8082:8080"
      - "0.0.0.0:9090:9090"
    networks:
      - pentest_lab
    restart: unless-stopped

  zap_scanner:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap_scanner
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.key=pentest_key_2026 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    ports:
      - "127.0.0.1:8090:8080"
    networks:
      - pentest_lab
    restart: unless-stopped

networks:
  pentest_lab:
    driver: bridge
